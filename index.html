<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="bg"></div>
    <div id="pomodoro">
      <div id="pomodoro-overlay">
        <img src="Ripple@1x-1.0s-200px-200px.gif" alt="Loading..." />
      </div>
      <span class="btn-icon" id="toggle-settings">
        <i class="fa-solid fa-gear"></i>
      </span>
      <div id="timer-progress"></div>
      <div id="timer-sessions"></div>
      <div id="timer-functions">
        <div id="timer-settings"></div>
        <div id="timer-buttons"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
